# Nome do Workflow
name: Generate GitHub Snake Animation

# Gatilhos: quando a Action deve rodar
on:
  # Roda automaticamente a cada 6 horas
  schedule:
    - cron: "0 */6 * * *"
  
  # Permite que você rode manualmente pela aba "Actions"
  workflow_dispatch:

# Tarefas a serem executadas
jobs:
  build:
    # Sistema operacional onde a tarefa vai rodar
    runs-on: ubuntu-latest

    steps:
      # 1. Clona o seu repositório para a máquina virtual da Action
      - uses: actions/checkout@v4

      # 2. Gera a animação da cobrinha
      - uses: Platane/snk@v3
        with:
          # O seu nome de usuário do GitHub
          github_user_name: ${{ github.repository_owner }}
          
          # Lista de arquivos de saída a serem gerados
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

        # Token de autenticação para a Action poder acessar seu perfil
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. Envia os arquivos gerados para a branch 'output'
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          # A branch de destino para os arquivos gerados
          target_branch: output
          # O diretório que contém os arquivos a serem publicados
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
