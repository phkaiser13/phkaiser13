<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="300" viewBox="0 0 1280 300">
  <!-- Definições de Gradientes e Estilos -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <radialGradient id="circleGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00c9ff" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#92fe9d" stop-opacity="0.1" />
    </radialGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFDEE9" />
      <stop offset="100%" stop-color="#B5FFFC" />
    </linearGradient>
    <style>
      .title {
        fill: url(#textGradient);
        font-family: 'Segoe UI', sans-serif;
        font-size: 48px;
        font-weight: 700;
      }
      .subtitle {
        fill: #ffffff;
        font-family: 'Segoe UI', sans-serif;
        font-size: 24px;
        font-weight: 500;
      }
      .skills {
        fill: #cccccc;
        font-family: 'Segoe UI', sans-serif;
        font-size: 16px;
      }
    </style>
  </defs>

  <!-- Fundo -->
  <rect width="1280" height="300" fill="url(#bgGradient)" />

  <!-- Elementos decorativos à esquerda -->
  <circle cx="180" cy="150" r="200" fill="url(#circleGradient)" />
  <polygon points="0,0 0,300 150,150" fill="rgba(255,255,255,0.03)" />
  <polygon points="100,0 300,300 200,0" fill="rgba(255,255,255,0.05)" />

  <!-- Informações do lado direito -->
  <text x="700" y="100" class="title">Pedro H (Phkaiser13)</text>
  <text x="700" y="145" class="subtitle">Engineer &amp; Full‑Stack Dev</text>
  <text x="700" y="190" class="skills">Softwares ・ Applications ・ AI &amp; LLM</text>
  <text x="700" y="215" class="skills">C/C++ ・ Rust ・ Java ・ C# ・ Python</text>
</svg>
