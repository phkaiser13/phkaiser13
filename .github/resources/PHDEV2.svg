<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="300" viewBox="0 0 1280 300">
  <!-- Definições de gradientes, filtros e animações -->
  <defs>
    <!-- Gradiente de fundo animado -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f1c2c" />
      <stop offset="100%" stop-color="#928dab" />
      <animate attributeName="x1" values="0%;100%;0%" dur="15s" repeatCount="indefinite" />
      <animate attributeName="y2" values="100%;0%;100%" dur="15s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Gradiente para formas com movimento sutil -->
    <linearGradient id="shapeGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8cdda" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#1d2b64" stop-opacity="0.6" />
    </linearGradient>

    <!-- Filtro de sombra projetada -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur" />
      <feOffset in="blur" dx="4" dy="4" result="offsetBlur" />
      <feMerge>
        <feMergeNode in="offsetBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Estilos de texto com sombra leve -->
    <style>
      .title {
        fill: #ffffff;
        font-family: 'Segoe UI', sans-serif;
        font-size: 52px;
        font-weight: 700;
        filter: url(#dropShadow);
      }
      .subtitle {
        fill: #e0e0e0;
        font-family: 'Segoe UI', sans-serif;
        font-size: 26px;
        font-weight: 500;
      }
      .skills {
        fill: #c0c0c0;
        font-family: 'Segoe UI', sans-serif;
        font-size: 18px;
      }
      .underline {
        stroke: #ffffff;
        stroke-width: 2;
        opacity: 0.8;
      }
      .shape {
        filter: url(#dropShadow);
        transform-origin: center;
        animation: rotateShape 30s infinite linear;
      }
      @keyframes rotateShape {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
    </style>
  </defs>

  <!-- Fundo animado -->
  <rect width="1280" height="300" fill="url(#bgGradient)" />

  <!-- Formas geométricas dinâmicas com sombra e rotação -->
  <polygon class="shape" points="0,300 300,150 0,0" fill="url(#shapeGradient)" />
  <circle class="shape" cx="900" cy="150" r="170" fill="url(#shapeGradient)" />
  <rect class="shape" x="400" y="50" width="400" height="200" rx="30" ry="30" fill="url(#shapeGradient)" />

  <!-- Texto principal com linha de destaque -->
  <text x="60" y="110" class="title">Pedro H (Phkaiser13)</text>
  <line x1="60" y1="120" x2="460" y2="120" class="underline" />
  <text x="60" y="160" class="subtitle">Engineer &amp; Full‑Stack Dev</text>

  <!-- Texto secundário / skills com espaçamento aprimorado -->
  <text x="60" y="205" class="skills">Softwares ・ Applications ・ AI &amp; LLM</text>
  <text x="60" y="230" class="skills">C/C++ ・ Rust ・ Java ・ C# ・ Python</text>

  <!-- Decoração extra: linhas diagonais finas -->
  <g stroke="#ffffff" stroke-opacity="0.1" stroke-width="1">
    <line x1="0" y1="0" x2="1280" y2="300" />
    <line x1="0" y1="50" x2="1230" y2="300" />
  </g>
</svg>
