<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="300" viewBox="0 0 1280 300" preserveAspectRatio="xMidYMid slice">
  <!-- DEFINIÇÕES -->
  <defs>
    <!-- Fundo Gradiente Suave -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#2c5364"/>
      <stop offset="100%" stop-color="#203a43"/>
    </linearGradient>

    <!-- Gradientes de Destaque -->
    <radialGradient id="spotlight" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <linearGradient id="accentBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#3a7bd5"/>
    </linearGradient>
    <linearGradient id="accentPink" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f953c6"/>
      <stop offset="100%" stop-color="#b91cdb"/>
    </linearGradient>

    <!-- Sombra Suave -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset in="blur" dx="0" dy="6" result="offsetBlur"/>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Tipografia Moderna -->
    <style>
      .title { fill: #ffffff; font-family: 'Montserrat', sans-serif; font-size: 58px; font-weight: 800; letter-spacing: 1px; }
      .subtitle { fill: #d0d4da; font-family: 'Montserrat', sans-serif; font-size: 24px; font-weight: 500; letter-spacing: 0.5px; }
      .skills { fill: #a8aeb3; font-family: 'Montserrat', sans-serif; font-size: 14px; }
    </style>
  </defs>

  <!-- FUNDO -->
  <rect width="1280" height="300" fill="url(#bgGradient)"/>
  <rect width="1280" height="300" fill="url(#spotlight)"/>

  <!-- FORMAS ANIMADAS -->
  <g filter="url(#softShadow)">
    <path id="shape1" d="M0,300 L350,200 L0,100 Z" fill="url(#accentBlue)">
      <animateTransform attributeName="transform" type="translate" values="0,0;10,0;0,0" dur="8s" repeatCount="indefinite"/>
    </path>
    <circle id="shape2" cx="360" cy="240" r="55" fill="url(#accentPink)">
      <animate attributeName="r" values="50;65;50" dur="6s" repeatCount="indefinite"/>
    </circle>
    <rect x="540" y="20" width="380" height="260" rx="40" fill="url(#accentBlue)" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" values="0 730 150;3 730 150;0 730 150" dur="10s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- TRAÇOS DINÂMICOS -->
  <line x1="300" y1="150" x2="480" y2="150" stroke="#ffffff" stroke-width="1.5" opacity="0.2" stroke-dasharray="6 3"/>
  <line x1="1000" y1="60" x2="1000" y2="240" stroke="#ffffff" stroke-width="1" opacity="0.25" stroke-dasharray="3 6"/>

  <!-- DIVISOR -->
  <line x1="640" y1="15" x2="640" y2="285" stroke="#ffffff" stroke-width="1.5" opacity="0.12"/>

  <!-- TEXTO -->
  <text x="680" y="90" class="title">Pedro Henrique</text>
  <text x="680" y="140" class="subtitle">Engineer & Full‑Stack Developer</text>
  <text x="680" y="180" class="skills">Software ・ Applications ・ AI & LLM</text>
  <text x="680" y="200" class="skills">C/C++ ・ Rust ・ Java ・ C# ・ Python</text>
  <text x="680" y="220" class="skills">DevOps ・ Cloud ・ IoT ・ Embedded Systems</text>
  <text x="680" y="240" class="skills">Oracle Certificado ・ AWS ・ Docker ・ Kubernetes</text>

  <!-- DETALHES -->
  <g fill="#ffffff" opacity="0.3">
    <circle cx="1250" cy="50" r="4">
      <animate attributeName="cx" values="1250;1240;1250" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1230" cy="260" r="5">
      <animate attributeName="cy" values="260;255;260" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1180" cy="150" r="7">
      <animate attributeName="r" values="6;8;6" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
